<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse · 智能对话</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --border: #334155;
    --user-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
    --assistant-bg: #1e293b;
    --success: #22c55e;
    --warning: #f59e0b;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* —— Header —— */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header .brand { display:flex; align-items:center; gap:10px; }
  .header .brand h1 { font-size:17px; font-weight:600; background:linear-gradient(135deg,#818cf8,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header .brand span { font-size:11px; color:var(--text2); background:var(--surface2); padding:2px 8px; border-radius:10px; }
  .header .tools { display:flex; gap:10px; align-items:center; }
  .header .tools select, .header .tools button {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
  }
  .header .tools select:hover, .header .tools button:hover { border-color: var(--accent); }
  .header .tools .search-toggle { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; user-select:none; }
  .header .tools .search-toggle input { display:none; }
  .header .tools .search-toggle .slider {
    width: 32px; height: 18px; background: var(--border); border-radius: 9px; position:relative; transition: .2s;
  }
  .header .tools .search-toggle .slider::after {
    content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:var(--text); border-radius:50%; transition:.2s;
  }
  .header .tools .search-toggle input:checked + .slider { background: var(--accent); }
  .header .tools .search-toggle input:checked + .slider::after { transform:translateX(14px); }
  .header .links a { color:var(--text2); font-size:12px; margin-left:12px; text-decoration:none; transition:.2s; }
  .header .links a:hover { color:var(--text); }

  /* —— Session Bar —— */
  .session-bar {
    display:flex; gap:8px; padding:8px 20px; background:var(--bg); border-bottom:1px solid var(--border); align-items:center; flex-shrink:0;
  }
  .session-bar input {
    flex:1; padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; outline:none;
  }
  .session-bar input:focus { border-color: var(--accent); }
  .session-bar button {
    padding:6px 14px; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:12px; cursor:pointer; white-space:nowrap; transition:.2s;
  }
  .session-bar button:hover { border-color: var(--accent); }

  /* —— Chat —— */
  .chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth; }
  .chat-area::-webkit-scrollbar { width:6px; }
  .chat-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Welcome */
  .welcome { text-align:center; padding:40px 20px; }
  .welcome .logo { font-size:56px; margin-bottom:16px; }
  .welcome h2 { font-size:22px; margin-bottom:8px; background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .welcome p { color:var(--text2); font-size:14px; margin-bottom:24px; line-height:1.6; }
  .welcome .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:500px; margin:0 auto; }
  .welcome .chip {
    padding:8px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text2); font-size:13px; cursor:pointer; transition:.2s;
  }
  .welcome .chip:hover { border-color:var(--accent); color:var(--text); background:var(--surface); }

  /* Messages */
  .msg { display:flex; gap:10px; animation:fadeIn .35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction:row-reverse; }
  .msg .avatar { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0; }
  .msg.user .avatar { background:var(--accent);color:#fff; }
  .msg.assistant .avatar { background:var(--surface2);color:var(--accent); }
  .msg .bubble {
    max-width:78%; padding:12px 16px; border-radius:14px; font-size:14px; line-height:1.7; word-break:break-word;
  }
  .msg.user .bubble { background:var(--user-bg); color:#fff; border-bottom-right-radius:4px; }
  .msg.assistant .bubble { background:var(--assistant-bg); color:var(--text); border-bottom-left-radius:4px; }
  .msg .bubble p { margin:6px 0; }
  .msg .bubble p:first-child { margin-top:0; }
  .msg .bubble p:last-child { margin-bottom:0; }
  .msg .bubble code { background:#0f172a; padding:1px 5px; border-radius:3px; font-size:13px; }
  .msg .bubble pre { background:#0f172a; padding:12px; border-radius:8px; overflow-x:auto; margin:8px 0; font-size:12px; }
  .msg .bubble pre code { background:none; padding:0; }
  .msg .bubble a { color:#818cf8; }
  .msg .bubble ol, .msg .bubble ul { margin:6px 0 6px 20px; }
  .msg .meta { font-size:11px; color:var(--text2); margin-top:4px; padding:0 4px; display:flex; gap:8px; }
  .msg.user .meta { justify-content:flex-end; }
  .msg .meta .intent-tag { background:var(--surface2); padding:1px 8px; border-radius:10px; font-size:10px; }

  /* Typing */
  .typing { display:flex; gap:6px; padding:8px 0; }
  .typing span { width:7px;height:7px;background:var(--text2);border-radius:50%;animation:typing 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay:.2s; }
  .typing span:nth-child(3) { animation-delay:.4s; }
  @keyframes typing { 0%,60%,100%{opacity:.3} 30%{opacity:1} }

  /* Input */
  .input-area { padding:12px 20px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:10px; flex-shrink:0; }
  .input-area textarea {
    flex:1; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:inherit; resize:none; rows:1; max-height:100px; outline:none; transition:.2s;
  }
  .input-area textarea:focus { border-color:var(--accent); }
  .input-area button {
    padding:10px 22px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; transition:.2s; white-space:nowrap;
  }
  .input-area button:hover { opacity:.9; transform:translateY(-1px); }
  .input-area button:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* Toast */
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--border); padding:8px 20px; border-radius:20px; font-size:12px; color:var(--text2); z-index:10; animation:toastIn .3s ease; pointer-events:none; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(12px)} }

  /* Responsive */
  @media (max-width:640px) {
    .header { padding:0 12px; }
    .header .brand h1 { font-size:15px; }
    .header .tools { gap:6px; }
    .session-bar { padding:8px 12px; }
    .chat-area { padding:12px; }
    .input-area { padding:10px 12px; }
    .msg .bubble { max-width:88%; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">
    <h1>🧠 Synapse</h1>
    <span id="modelBadge">loading…</span>
  </div>
  <div class="tools">
    <label class="search-toggle" title="开启后，知识问答会联网搜索最新信息">
      <input type="checkbox" id="searchToggle" checked onchange="toggleSearch()">
      <div class="slider"></div>
      <span>🌐 联网</span>
    </label>
    <select id="modelSelect" onchange="switchModel(this.value)" title="切换 LLM 模型">
      <option value="">默认模型</option>
    </select>
    <div class="links">
      <a href="/docs" target="_blank">API</a>
      <a href="/health" target="_blank">健康</a>
      <a href="/metrics" target="_blank">指标</a>
    </div>
  </div>
</div>

<!-- Session -->
<div class="session-bar">
  <input id="sessionId" value="demo-001" placeholder="会话 ID（同 ID 共享记忆）">
  <button onclick="newSession()" title="生成随机新会话 ID">🆕 新会话</button>
  <button onclick="clearChat()" title="仅清空聊天记录，记忆保留">🧹 清屏</button>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="logo">🧠</div>
    <h2>你好，我是 Synapse</h2>
    <p>基于多 Agent 的智能对话平台<br>支持知识检索 · 文档摘要 · 联网搜索 · 长期记忆</p>
    <div class="chips">
      <div class="chip" onclick="quickAsk('什么是向量数据库？它和传统数据库有什么区别？')">🔍 什么是向量数据库？</div>
      <div class="chip" onclick="quickAsk('最近有哪些重要的 AI 新闻？')">🌐 最近 AI 新闻</div>
      <div class="chip" onclick="quickAsk('Python 和 Rust 各有什么优缺点？')">🐍 Python vs Rust</div>
      <div class="chip" onclick="quickAsk('推荐 3 本入门机器学习的书')">📚 机器学习入门书</div>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <textarea id="msgInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行…" rows="1"></textarea>
  <button id="sendBtn" onclick="send()">➤ 发送</button>
</div>

<script>
// ==================== State ====================
const api = '/chat';
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const modelBadge = document.getElementById('modelBadge');
const modelSelect = document.getElementById('modelSelect');
const searchToggle = document.getElementById('searchToggle');
let empty = true;
let webSearchEnabled = true;

// ==================== Init ====================
(async function init() {
  try {
    const res = await fetch('/models');
    const cfg = await res.json();
    modelBadge.textContent = `${cfg.provider} / ${cfg.model}`;
    modelBadge.title = `base_url: ${cfg.base_url}\nembedding key: ${cfg.embedding_api_key_set ? '已配' : '未配'}`;
    if (!cfg.embedding_api_key_set && cfg.provider === 'deepseek') {
      modelBadge.title += '\n⚠️ DeepSeek 不支持 embedding，长期记忆/知识检索依赖本地 ONNX';
    }
    // 填充模型选择器
    const models = ['deepseek-chat', 'deepseek-reasoner', 'gpt-4o-mini', 'gpt-4o', 'gpt-3.5-turbo', 'claude-3-5-sonnet-20241022', 'claude-3-haiku-20240307'];
    models.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; modelSelect.appendChild(o); });
  } catch(e) { modelBadge.textContent = '未连接'; }
})();

// ==================== Search Toggle ====================
function toggleSearch() { webSearchEnabled = searchToggle.checked; }

// ==================== Model Switch ====================
async function switchModel(model) {
  if (!model) return;
  try {
    const res = await fetch('/models/switch', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model})
    });
    const cfg = await res.json();
    modelBadge.textContent = `${cfg.provider} / ${cfg.model}`;
    showToast(`已切换至 ${cfg.model}`);
  } catch(e) { showToast('切换失败'); }
}

// ==================== Session ====================
function getSessionId() { return document.getElementById('sessionId').value.trim() || 'default'; }
function newSession() { document.getElementById('sessionId').value = 'sess-' + Date.now().toString(36); }
function clearChat() { chatArea.innerHTML = ''; empty = true; renderWelcome(); }

// ==================== Messages ====================
function addMsg(role, text, meta) {
  if (empty) { chatArea.innerHTML = ''; empty = false; }
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? '🧑' : '🤖';
  const body = role === 'assistant' ? renderMarkdown(text) : escapeHtml(text).replace(/\n/g,'<br>');
  const metaHtml = meta ? `<div class="meta">${meta.map(m => `<span class="intent-tag">${m}</span>`).join('')}</div>` : '';
  div.innerHTML = `<div class="avatar">${avatar}</div><div><div class="bubble">${body}</div>${metaHtml}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div'); div.className = 'msg assistant'; div.id = 'typing-indicator';
  div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatArea.appendChild(div); chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const el = document.getElementById('typing-indicator'); if(el) el.remove(); }

function renderMarkdown(text) {
  if (typeof marked === 'undefined') return escapeHtml(text).replace(/\n/g, '<br>');
  marked.setOptions({ breaks: true, gfm: true });
  try { return marked.parse(text); } catch(e) { return escapeHtml(text).replace(/\n/g,'<br>'); }
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ==================== Welcome ====================
function renderWelcome() {
  chatArea.innerHTML = `
    <div class="welcome">
      <div class="logo">🧠</div>
      <h2>你好，我是 Synapse</h2>
      <p>基于多 Agent 的智能对话平台<br>支持知识检索 · 文档摘要 · 联网搜索 · 长期记忆</p>
      <div class="chips">
        <div class="chip" onclick="quickAsk('什么是向量数据库？它和传统数据库有什么区别？')">🔍 什么是向量数据库？</div>
        <div class="chip" onclick="quickAsk('最近有哪些重要的 AI 新闻？')">🌐 最近 AI 新闻</div>
        <div class="chip" onclick="quickAsk('Python 和 Rust 各有什么优缺点？')">🐍 Python vs Rust</div>
        <div class="chip" onclick="quickAsk('推荐 3 本入门机器学习的书')">📚 机器学习入门书</div>
      </div>
    </div>`;
  empty = true;
}

// ==================== Quick Ask ====================
function quickAsk(msg) {
  document.getElementById('msgInput').value = msg;
  send();
}

// ==================== Toast ====================
function showToast(msg) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = '.3s'; setTimeout(() => el.remove(), 300); }, 2000);
}

// ==================== Send ====================
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
});

async function send() {
  const msg = msgInput.value.trim();
  if (!msg) return;
  const sid = getSessionId();
  if (empty) { chatArea.innerHTML = ''; empty = false; }
  addMsg('user', msg);
  msgInput.value = ''; msgInput.style.height = 'auto';
  sendBtn.disabled = true; sendBtn.textContent = '…';
  addTyping();

  try {
    const body = { session_id: sid, message: msg };
    const headers = { 'Content-Type': 'application/json', 'X-Web-Search': webSearchEnabled ? '1' : '0' };

    const res = await fetch(api, {
      method:'POST', headers,
      body: JSON.stringify(body),
    });
    const data = await res.json();
    removeTyping();
    if (res.ok) {
      const tags = [`意图: ${data.intent}`, `Agent: ${data.agent_used}`, `置信: ${(data.confidence*100).toFixed(0)}%`];
      addMsg('assistant', data.reply, tags);
    } else {
      addMsg('assistant', `❌ ${data.detail || '请求失败，请重试'}`);
    }
  } catch(e) {
    removeTyping();
    addMsg('assistant', '⚠️ 无法连接到服务器。请确认 docker compose up -d 已启动。\n\n终端运行：`docker compose up -d`');
  }
  sendBtn.disabled = false;
  sendBtn.textContent = '➤ 发送';
}
</script>
</body>
</html>
