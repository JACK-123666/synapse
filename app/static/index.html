<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse · 智能对话</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header span { font-size: 12px; opacity: .6; }
  .header .links a { color: #8ab4f8; font-size: 13px; margin-left: 16px; text-decoration: none; }
  .container {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .session-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    align-items: center;
  }
  .session-bar input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .session-bar input:focus { border-color: #0f3460; }
  .session-bar button {
    padding: 8px 16px;
    background: #fff;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
    transition: all .2s;
  }
  .session-bar button:hover { background: #f5f5f5; }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: #0f3460; color: #fff; }
  .msg.assistant .avatar { background: #e6f4ff; color: #0f3460; }
  .msg .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble { background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .msg .meta {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
    padding: 0 2px;
  }
  .msg.user .meta { text-align: right; }
  .input-area {
    padding: 14px 20px;
    background: #fff;
    border-top: 1px solid #e8e8e8;
    display: flex;
    gap: 10px;
  }
  .input-area textarea {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #d9d9d9;
    border-radius: 8px;
    resize: none;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    rows: 1;
    max-height: 100px;
    transition: border-color .2s;
  }
  .input-area textarea:focus { border-color: #0f3460; }
  .input-area button {
    padding: 10px 24px;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: opacity .2s;
  }
  .input-area button:hover { opacity: .9; }
  .input-area button:disabled { opacity: .5; cursor: not-allowed; }
  .empty-state {
    text-align: center;
    color: #999;
    padding: 60px 20px;
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #666; }
  .empty-state p { font-size: 13px; }
  .tip { background: #fffbe6; border: 1px solid #ffe58f; padding: 8px 14px; border-radius: 6px; font-size: 12px; color: #8c6d00; margin: 0 20px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🧠 Synapse · 智能对话</h1>
    <span>多 Agent 知识检索平台</span>
  </div>
  <div class="links">
    <a href="/docs" target="_blank">API 文档</a>
    <a href="/health" target="_blank">健康检查</a>
  </div>
</div>

<div class="container">
  <div class="session-bar">
    <input id="sessionId" value="demo-001" placeholder="会话 ID（同一 ID 共享记忆）">
    <button onclick="newSession()">新会话</button>
    <button onclick="clearSession()">清记忆</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <h3>👋 你好，我是 Synapse</h3>
      <p>试试问我：「什么是向量数据库」「帮我总结一下」「你好」</p>
    </div>
  </div>

  <div class="tip" id="tip" style="display:none"></div>

  <div class="input-area">
    <textarea id="msgInput" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行…" rows="1"></textarea>
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
const api = '/chat';
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const tip = document.getElementById('tip');
let empty = true;

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function getSessionId() { return document.getElementById('sessionId').value.trim() || 'default'; }
function newSession() { document.getElementById('sessionId').value = 'sess-' + Date.now().toString(36); }
function clearSession() { chatArea.innerHTML = '<div class="empty-state"><h3>记忆已清空</h3></div>'; empty = true; empty = true; }

function addMsg(role, text, meta) {
  if (empty) { chatArea.innerHTML = ''; empty = false; }
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? '🧑' : '🤖';
  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div>
      <div class="bubble">${escapeHtml(text)}</div>
      ${meta ? `<div class="meta">${meta}</div>` : ''}
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function send() {
  const msg = msgInput.value.trim();
  if (!msg) return;
  const sid = getSessionId();
  addMsg('user', msg);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  sendBtn.textContent = '...';
  tip.style.display = 'none';

  try {
    const res = await fetch(api, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sid, message: msg }),
    });
    const data = await res.json();
    if (res.ok) {
      addMsg('assistant', data.reply, `意图：${data.intent} · Agent：${data.agent_used} · 置信度：${(data.confidence*100).toFixed(0)}%`);
    } else {
      addMsg('assistant', '出错了：' + (data.detail || '未知错误'));
    }
  } catch (e) {
    addMsg('assistant', '无法连接到服务，请确认 docker-compose 已启动');
    tip.style.display = 'block';
    tip.textContent = '提示：请先运行 docker-compose up -d 启动服务';
  }
  sendBtn.disabled = false;
  sendBtn.textContent = '发送';
}

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
